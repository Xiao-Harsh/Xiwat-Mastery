# Server Configuration
server.port=${PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=never

# Database Configuration
# Default to H2 for local run, overrides via ENV for Render/MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:xiwatdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true


# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Security/JWT Configuration
# Local dev secret (MUST be overridden in Render with a long base64 string)
application.security.jwt.secret-key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# 15 minutes in ms
application.security.jwt.expiration=900000

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.xiwat=INFO
